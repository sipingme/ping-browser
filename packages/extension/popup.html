<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ping-browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }
    .status-card {
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .status-row:last-child {
      margin-bottom: 0;
    }
    .status-label {
      font-size: 13px;
      color: #6b7280;
    }
    .status-value {
      font-size: 13px;
      font-weight: 500;
    }
    .status-connected {
      color: #10b981;
    }
    .status-disconnected {
      color: #ef4444;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-connected {
      background: #10b981;
    }
    .dot-disconnected {
      background: #ef4444;
    }
    .url-value {
      color: #4b5563;
      font-family: monospace;
      font-size: 12px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #4f46e5;
      color: white;
    }
    .btn-primary:hover {
      background: #4338ca;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    .btn-secondary:hover {
      background: #d1d5db;
    }
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #6b7280;
      text-decoration: none;
    }
    .footer a:hover {
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="ping-browser">
    <h1>ping-browser</h1>
  </div>
  
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">连接状态</span>
      <span class="status-value" id="connection-status">
        <span class="status-dot dot-disconnected" id="status-dot"></span>
        <span id="status-text">检测中...</span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">服务地址</span>
      <span class="status-value url-value" id="upstream-url">-</span>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-secondary" id="btn-reconnect">重新连接</button>
    <button class="btn btn-primary" id="btn-settings">设置</button>
  </div>
  
  <div class="footer">
    <a href="https://github.com/sipingme/ping-browser" target="_blank">GitHub</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
